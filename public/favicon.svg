<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#e8e4df"/>
  <!-- T shadow -->
  <g transform="translate(4,4)">
    <rect x="4" y="8" width="26" height="7" rx="1" fill="#1a1a2e" transform="rotate(2,17,11)"/>
    <rect x="12" y="8" width="8" height="30" rx="1" fill="#1a1a2e" transform="rotate(2,16,23)"/>
  </g>
  <!-- K shadow -->
  <g transform="translate(4,4)">
    <rect x="32" y="8" width="8" height="30" rx="1" fill="#1a1a2e" transform="rotate(-3,36,23)"/>
    <polygon points="40,22 56,8 48,8 36,20" fill="#1a1a2e" transform="rotate(-3,44,15)"/>
    <polygon points="40,24 56,38 48,38 36,26" fill="#1a1a2e" transform="rotate(-3,44,31)"/>
  </g>
  <!-- T white mid -->
  <g transform="translate(2,2)">
    <rect x="4" y="8" width="26" height="7" rx="1" fill="white" transform="rotate(2,17,11)"/>
    <rect x="12" y="8" width="8" height="30" rx="1" fill="white" transform="rotate(2,16,23)"/>
  </g>
  <!-- K white mid -->
  <g transform="translate(2,2)">
    <rect x="32" y="8" width="8" height="30" rx="1" fill="white" transform="rotate(-3,36,23)"/>
    <polygon points="40,22 56,8 48,8 36,20" fill="white" transform="rotate(-3,44,15)"/>
    <polygon points="40,24 56,38 48,38 36,26" fill="white" transform="rotate(-3,44,31)"/>
  </g>
  <!-- T orange -->
  <rect x="4" y="8" width="26" height="7" rx="1" fill="#ff6b2b" stroke="#1a1a2e" stroke-width="1" transform="rotate(2,17,11)"/>
  <rect x="12" y="8" width="8" height="30" rx="1" fill="#ff6b2b" stroke="#1a1a2e" stroke-width="1" transform="rotate(2,16,23)"/>
  <!-- K blue -->
  <rect x="32" y="8" width="8" height="30" rx="1" fill="#2b3fff" stroke="#1a1a2e" stroke-width="1" transform="rotate(-3,36,23)"/>
  <polygon points="40,22 56,8 48,8 36,20" fill="#2b3fff" stroke="#1a1a2e" stroke-width="1" transform="rotate(-3,44,15)"/>
  <polygon points="40,24 56,38 48,38 36,26" fill="#2b3fff" stroke="#1a1a2e" stroke-width="1" transform="rotate(-3,44,31)"/>
